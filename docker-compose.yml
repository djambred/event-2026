services:
  php:
    build:
      context: ./php
    container_name: event_php
    volumes:
      - ./src:/var/www/html
    environment:
      - PROJECT_NAME=event
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "composer", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    build:
      context: ./nginx
    container_name: event_nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - php
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --show-error --fail --insecure https://international-events2026.esaunggul.ac.id/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    container_name: event_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

  db:
    image: mariadb:10.11
    container_name: event_db
    ports:
      - "13306:3306"
    environment:
      MYSQL_DATABASE: event
      MYSQL_ROOT_PASSWORD: p455w0rd
    volumes:
      - ./db/conf.d:/etc/mysql/conf.d
      - ./db/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
